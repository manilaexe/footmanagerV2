# ── Server ───────────────────────────────────────────────────────────────
server.port=8080

# Mostra dettagli degli errori HTTP
server.error.include-message=always
server.error.include-stacktrace=always


# ── DataSource ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/footmanager?useSSL=false&serverTimezone=Europe/Rome&allowPublicKeyRetrieval=true
spring.datasource.username=footmanager
spring.datasource.password=footmanager_pwd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ── JPA ──────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ── Flyway ───────────────────────────────────────────────────────────────
# Disabilitato: usi il tuo SQL esistente (footmanagermysql.sql)
spring.flyway.enabled=false


# ── JWT ──────────────────────────────────────────────────────────────────
app.jwt.secret=UnaSegreteDellaLunghezzaDiAlmenoTrentadueCarat!!2025
app.jwt.expiration-ms=86400000


# ── Quiz timeout ─────────────────────────────────────────────────────────
app.quiz.timeout-seconds=40


# ── CORS ─────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500


# ── Logging ──────────────────────────────────────────────────────────────
logging.level.it.footmanager=DEBUG
logging.level.org.springframework.security=WARN

# Log dettagliato richiesto per trovare il 500 del login
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.hibernate.SQL=DEBUG